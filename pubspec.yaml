name: ai_wave
description: AI Wave - Your intelligent assistant with voice, chat, and image AI capabilities.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1

  # State Management
  provider: ^6.1.2

  # Voice
  speech_to_text: ^6.6.2
  permission_handler: ^11.3.1

  # AI & Networking
  http: ^1.2.1
  google_generative_ai: ^0.4.3

  # Storage & Config
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.3

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  google_sign_in: ^6.2.1

  # Image
  image_picker: ^1.1.2

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/animations/
